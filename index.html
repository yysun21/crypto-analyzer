<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Pro Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#080c10;--bg2:#0d1117;--bg3:#161b22;--bg4:#1c2128;
  --b:rgba(255,255,255,0.08);--b2:rgba(255,255,255,0.14);
  --t:#cdd9e5;--t2:#768390;--t3:#444c56;
  --green:#3fb950;--gbg:rgba(63,185,80,0.1);--gb:rgba(63,185,80,0.25);
  --red:#f85149;--rbg:rgba(248,81,73,0.1);--rb:rgba(248,81,73,0.25);
  --amber:#d29922;--abg:rgba(210,153,34,0.1);--ab:rgba(210,153,34,0.25);
  --blue:#388bfd;--bbg:rgba(56,139,253,0.1);--bb:rgba(56,139,253,0.25);
  --purple:#bc8cff;--pbg:rgba(188,140,255,0.1);--pb:rgba(188,140,255,0.25);
  --r:8px;--r2:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);}
body{font-family:'IBM Plex Sans KR',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;padding:24px 20px;max-width:1100px;margin:0 auto;}

/* header */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.hdr-l{display:flex;align-items:center;gap:12px;}
.logo{width:38px;height:38px;background:var(--bg3);border:1px solid var(--b2);border-radius:10px;display:flex;align-items:center;justify-content:center;}
.hdr h1{font-size:16px;font-weight:500;}
.hdr p{font-size:11px;color:var(--t3);margin-top:1px;}
.live-wrap{display:flex;align-items:center;gap:6px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-txt{font-size:11px;color:var(--green);font-family:'IBM Plex Mono',monospace;}
.upd-txt{font-size:11px;color:var(--t3);font-family:'IBM Plex Mono',monospace;}

/* api key */
.key-bar{display:flex;gap:8px;align-items:center;background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:9px 14px;margin-bottom:16px;}
.key-bar input{flex:1;background:transparent;border:none;color:var(--t);font-family:'IBM Plex Mono',monospace;font-size:12px;outline:none;}
.key-bar input::placeholder{color:var(--t3);}
.key-bar label{font-size:11px;color:var(--t3);white-space:nowrap;}
.btn-sm{padding:5px 12px;border-radius:6px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-size:12px;cursor:pointer;transition:all .15s;}
.btn-sm:hover{color:var(--t);border-color:var(--blue);}
.btn-sm.saved{color:var(--green);border-color:var(--gb);}

/* controls */
.ctrl{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px;}
